<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Reportes - ReportaBC</title>

  <!-- CSS del proyecto -->
  <link rel="stylesheet" href="css/mapa.css" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

  <!-- =============================================
       ENCABEZADO
       ============================================= -->
  <header id="encabezado">
    <nav id="menu-navegacion">
      <div class="logo">
        <a href="index.html"><h1>ReportaBC</h1></a>
      </div>
      <ul class="menu-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="mapa.html" class="activo">Ver Reportes</a></li>
        <li><a href="reportar.html">Reportar Residuo</a></li>
        <li><a href="login.html">Iniciar Sesión</a></li>
        <li><a href="registro.html">Registrarse</a></li>
      </ul>
    </nav>
  </header>

  <!-- =============================================
       CONTENIDO PRINCIPAL
       ============================================= -->
  <main id="contenido-principal" class="layout-mapa">

    <!-- Panel lateral: filtros y lista de reportes -->
    <aside id="panel-lateral" class="panel-lateral">

      <!-- Filtros -->
      <section id="seccion-filtros" class="filtros">
        <h2>Filtrar reportes</h2>

        <div class="campo">
          <label for="filtro-tipo">Tipo de residuo</label>
          <select id="filtro-tipo">
            <option value="todos">Todos</option>
            <option value="basura-general">Basura general</option>
            <option value="escombros">Escombros</option>
            <option value="electrodomesticos">Electrodomésticos</option>
            <option value="organico">Orgánicos</option>
            <option value="peligroso">Peligrosos</option>
          </select>
        </div>

        <div class="campo">
          <label for="filtro-estado">Estado del reporte</label>
          <select id="filtro-estado">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="en-proceso">En proceso</option>
            <option value="resuelto">Resuelto</option>
          </select>
        </div>

        <button class="boton boton-secundario" id="btn-aplicar-filtros">Aplicar filtros</button>
      </section>

      <!-- Lista de reportes -->
      <section id="seccion-lista-reportes" class="lista-reportes">
        <h2>Reportes activos</h2>
        <div id="lista-reportes-container">
          <p class="placeholder-texto">Cargando reportes...</p>
        </div>
      </section>

    </aside>

    <!-- Mapa principal -->
    <section id="seccion-mapa" class="seccion-mapa">
      <!-- El div debe estar vacío para que Leaflet lo llene -->
      <div id="mapa-principal" class="mapa-principal"></div>
    </section>

  </main>

  <!-- =============================================
       PIE DE PÁGINA
       ============================================= -->
  <footer id="pie-pagina">
    <div class="footer-contenido">
      <p>ReportaBC &copy; 2024 — Proyecto comunitario de Baja California</p>
      <nav class="footer-links">
        <a href="index.html">Inicio</a>
        <a href="reportar.html">Reportar</a>
        <a href="mapa.html">Mapa</a>
        <a href="login.html">Acceder</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>

  <!-- Funcionamiento del mapa -->
  <script>
    // Crear el mapa centrado en Tijuana, Baja California
    var mapa = L.map('mapa-principal').setView([32.5149, -117.0382], 12);

    // Cargar imágenes del mapa desde OpenStreetMap 
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(mapa);

    // Reporte 1 - Alta urgencia
    L.marker([32.5200, -117.0300])
      .addTo(mapa)
      .bindPopup('<b>Residuos peligrosos</b><br>Col. Libertad, Tijuana<br><a href="detalle.html">Ver detalle</a>');

    // Reporte 2 - Media urgencia
    L.marker([32.5100, -117.0450])
      .addTo(mapa)
      .bindPopup('<b>Escombros en banqueta</b><br>Mesa de Otay, Tijuana<br><a href="detalle.html">Ver detalle</a>');

    // Reporte 3 - Baja urgencia
    L.marker([32.5050, -117.0200])
      .addTo(mapa)
      .bindPopup('<b>Bolsas de basura</b><br>Chapultepec, Tijuana<br><a href="detalle.html">Ver detalle</a>');
  </script>

  <script src="js/mapa.js"></script>
</body>
</html>
